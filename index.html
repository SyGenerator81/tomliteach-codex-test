<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TomliTeach GCSE English Worksheet Generator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="brand-header">
        <p class="brand-name">TomliTeach</p>
        <h1>TomliTeach GCSE English Worksheet Generator</h1>
        <p class="tagline">Clarity. Confidence. Results.</p>
        <p class="intro">Choose your lesson details, generate a worksheet, then print or save as PDF.</p>
      </header>

      <form id="generator-form" class="controls">
        <label>
          Subject Mode
          <select id="subject" required>
            <option value="GCSE English Language Paper 1">GCSE English Language Paper 1</option>
            <option value="GCSE English Language Paper 2">GCSE English Language Paper 2</option>
            <option value="Macbeth">Macbeth</option>
            <option value="A Christmas Carol">A Christmas Carol</option>
            <option value="An Inspector Calls">An Inspector Calls</option>
            <option value="Power and Conflict Poetry">Power and Conflict Poetry</option>
          </select>
        </label>

        <label>
          Topic / Question Focus
          <input
            type="text"
            id="questionType"
            placeholder="e.g. Macbeth: How does Shakespeare present ambition?"
            required
          />
        </label>
        <p id="questionWarning" class="question-warning" aria-live="polite"></p>

        <label>
          Target Grade
          <select id="grade" required>
            <option value="4">Grade 4</option>
            <option value="5">Grade 5</option>
            <option value="6">Grade 6</option>
            <option value="7">Grade 7</option>
            <option value="8">Grade 8</option>
            <option value="9">Grade 9</option>
          </select>
        </label>

        <label>
          Student Support Level
          <select id="support" required>
            <option value="High">High support</option>
            <option value="Medium" selected>Medium support</option>
            <option value="Low">Low support</option>
          </select>
        </label>

        <label>
          Lesson Focus
          <input
            type="text"
            id="focus"
            placeholder="e.g. Building analytical paragraphs with embedded quotations"
            required
          />
        </label>

        <label class="print-option">
          <input type="checkbox" id="hideTeacherNotesPrint" />
          Hide Teacher Notes when printing
        </label>

        <div class="button-row">
          <button type="submit">Generate Worksheet</button>
          <button type="button" id="printBtn">Print</button>
        </div>
      </form>

      <section id="worksheet" class="worksheet" aria-live="polite">
        <h2>Worksheet preview will appear here.</h2>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
